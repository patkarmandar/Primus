<!DOCTYPE html>
<html>
<body style="margin: 2rem;">
    <h2>Cross-Frame Scripting (XFS)</h2>
    <form onsubmit="loads(); return false;">
        <input id="url" placeholder="https://example.com" style="width:25%;" required>
        <button type="submit">Check</button>
    </form>

    <iframe id="frame" style="margin-top:1rem;width:70%;height:500px;opacity:0.75"></iframe>
</body>
<script>
    function loads(){
        let frame = document.getElementById("frame");
        frame.onload = null;
        frame.src = "about:blank";
        setTimeout(()=>{ frame.src=url.value.trim(); },200);
    }
</script>
</html>
